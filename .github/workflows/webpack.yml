name: Security CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    # Roda uma varredura completa toda segunda-feira às 00:00 UTC
    - cron: '0 0 * * 1'

jobs:
  # 1. Varredura de Segredos (Detectar chaves de API expostas)
  secret-scan:
    name: Secret Detection (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 2. Análise Estática de Código (SAST)
  sast-scan:
    name: Security Static Analysis (Semgrep)
    runs-on: ubuntu-latest
    # O pipeline continua mesmo se o scanner de segredos falhar, para expor todos os erros de uma vez
    needs: [] 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Semgrep
        run: |
          docker run --rm -v "${{ github.workspace }}:/src" returntocorp/semgrep semgrep ci --config=auto

  # 3. Análise de Dependências de Terceiros (SCA)
  sca-scan:
    name: Dependency Vulnerability Scan (SCA)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm' # Mude para 'pnpm' ou 'yarn' se não usar npm

      # Verifica vulnerabilidades conhecidas na árvore de dependências
      # O argumento '--audit-level=high' faz o pipeline falhar apenas se encontrar falhas Altas ou Críticas
      - name: Run Package Audit
        run: npm audit --audit-level=high
